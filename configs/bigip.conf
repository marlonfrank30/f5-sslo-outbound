ltm rule /Common/basic_sslo_bypass_other {
when RULE_INIT {
    set static::DEBUG 1

    ## Topology VIPs
    set static::INTERCEPT_VIP_OTHER "/Common/sslo_outbound.app/sslo_outbound-ot-4"
    set static::SSLO_BYPASS_VIP_OTHER "/Common/sslo_outbound_bypass.app/sslo_outbound_bypass-ot-4"
    set static::BYPASS_VIP "/Common/VS_forwarding"
}
when CLIENT_ACCEPTED {
    if { ( [class exists /Common/SRC_NET_BYPASS] ) and ( [class match [IP::client_addr] equals /Common/SRC_NET_BYPASS] ) } {
    # SSLO Proxy Bypass Clause 1 - Source Network Only
        if {$static::debug}{log local0. "Match Case 1 | SOURCE NET: [class match -name [IP::client_addr] equals /Common/SRC_NET_BYPASS] | DEST IP: [IP::local_addr] "}
        virtual $static::SSLO_BYPASS_VIP_OTHER
        event disable all
        return
    }
    elseif { ( [class exists /Common/DST_NET_BYPASS] ) and ( [class match [IP::local_addr] equals /Common/DST_NET_BYPASS] ) } {
    # SSLO Proxy Bypass Clause 2 - Destination Network Only
        if {$static::debug}{log local0. "Match Case 2 |  DEST NET: [class match -name [IP::local_addr] equals /Common/DST_NET_BYPASS] | DEST IP: [IP::local_addr] "}
        virtual $static::SSLO_BYPASS_VIP_OTHER
        event disable all
        return
    }
    elseif { ( [class exists /Common/sslo_full_bypass_ip] ) and ( [class match -- [IP::client_addr] equals /Common/sslo_full_bypass_ip] ) } {
        if { $static::DEBUG } { log local0. "Bypass by client IP for [IP::client_addr]" }
        virtual $static::BYPASS_VIP
        event disable all
        return
    }
    ## Default action for any non-TLS and non-matching traffic
    virtual $static::INTERCEPT_VIP_OTHER
}
}
ltm rule /Common/basic_sslo_bypass_tcp {
when RULE_INIT {
    set static::DEBUG 1

    ## Topology VIPs
    set static::INTERCEPT_VIP_TCP "/Common/sslo_outbound.app/sslo_outbound-in-t-4"
    set static::SSLO_BYPASS_VIP_TCP "/Common/sslo_outbound_bypass.app/sslo_outbound_bypass-in-t-4"
    set static::BYPASS_VIP "/Common/VS_forwarding"
}
when CLIENT_ACCEPTED { 
    if { ( [class exists /Common/SRC_NET_BYPASS] ) and ( [class match [IP::client_addr] equals /Common/SRC_NET_BYPASS] ) } {
    # SSLO Proxy Bypass Clause 1 - Source Network Only
        if {$static::DEBUG}{log local0. "Match Case 1 | SOURCE NET: [class match -name [IP::client_addr] equals /Common/SRC_NET_BYPASS] | DEST PORT: [TCP::local_port] | DEST IP: [IP::local_addr] "}
        virtual $static::SSLO_BYPASS_VIP_TCP
        event disable all
        return
    }
    elseif { ( [class exists /Common/DST_NET_BYPASS] ) and ( [class match [IP::local_addr] equals /Common/DST_NET_BYPASS] ) } {
    # SSLO Proxy Bypass Clause 2 - Destination Network Only
        if {$static::DEBUG}{log local0. "Match Case 2 |  DEST NET: [class match -name [IP::local_addr] equals /Common/DST_NET_BYPASS] | DEST PORT: [TCP::local_port] | DEST IP: [IP::local_addr] "}
        #set found 1
        virtual $static::SSLO_BYPASS_VIP_TCP
        event disable all
        return
    }
    elseif { ( [class exists /Common/sslo_full_bypass_ip] ) and ( [class match -- [IP::client_addr] equals /Common/sslo_full_bypass_ip] ) } {
        if { $static::DEBUG } { log local0. "Bypass by client IP for [IP::client_addr]" }
        virtual $static::BYPASS_VIP
        event disable all
        return
    }
    else {
    ## Default action for any non-TLS and non-matching traffic
    virtual $static::INTERCEPT_VIP_TCP
    }
}
when CLIENTSSL_CLIENTHELLO {
    ## Only triggered on TLS handshakes
    set s_sni "NULL"
    set sni_exists [SSL::extensions exists -type 0]
    if { $sni_exists } {
        binary scan [SSL::extensions -type 0] @9a* s_sni

        if { $static::DEBUG } { log local0. "Server Name Indication captured: ${s_sni}" }

        ## VIP switching logic
        if { [class match -- $s_sni ends_with sslo_full_bypass_sni] } {
            if { $static::DEBUG } { log local0. "Bypass by SNI for ${s_sni}" }
            virtual $static::BYPASS_VIP
              event disable all
              return
        }
    ## Default action for any non-TLS and non-matching traffic
    virtual $static::INTERCEPT_VIP_TCP
    if { $static::DEBUG } { log local0. "Sending to intercept VIP: ${s_sni}" }
    }
}
}
