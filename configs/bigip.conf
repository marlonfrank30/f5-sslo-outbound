when HTTP_REQUEST {
    HTTP::header remove "X-Authenticated-User"
}
}
ltm rule /Common/ssloS_LightSpeed.app/ssloS_LightSpeed-ilS {
    app-service /Common/ssloS_LightSpeed.app/ssloS_LightSpeed
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

when CLIENT_ACCEPTED {
 sharedvar ctx

 if {not [info exists ctx]} {
  event LB_SELECTED disable
  return
 }

 if {[set pn [IP::protocol]] == 6} {
  set proto TCP
 } elseif {$pn == 17} {
  set proto UDP
 } else {
  log local0.error "cannot handle IP protocol ${pn} from ${fromIP}"
  reject
  return
 }

 set default_pool [LB::server pool]
 append default_pool "_portremap"

 # remap destination port on known traffic over secure port
 switch $ctx(ptcl) {
  "https" {
    translate port enable
    pool ${default_pool}
  }
  "http-connect" {
    translate port enable
    pool ${default_pool}
  }
 }
} ; #CLIENT_ACCEPTED
}
