ltm rule /Common/sslo_outbound.app/sslo_outbound-in_t {
    app-service /Common/sslo_outbound.app/sslo_outbound
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

when CLIENT_ACCEPTED {
 SSL::disable clientside
 SSL::disable serverside
 HTTP::disable

 sharedvar ctx

 set ctx(log) 0
 set srcIP [IP::client_addr]
 set dstIP [IP::local_addr]
 set srcPort [TCP::client_port]
 set dstPort [TCP::local_port]
 set ctx(SNI) ""
 set ctx(ptcl) "unknown"
 set ctx(xpinfo) ""

 sharedvar XPHOST
 if { [info exists XPHOST] } {
  if { $XPHOST eq "" } {
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 0 "CLIENT_ACCEPTED invalid host (${XPHOST}) for explicit-proxy client ${srcIP}_${srcPort}"
   TCP::respond "HTTP/1.1 500 Server Error\r\nConnection: close\r\n\r\n"
   TCP::close
   return
  }

  if {$ctx(log)} {
   set ctx(xpinfo) "\x20explicit-proxy request ${XPHOST}"
  }

  set ctx(ptcl) "http"
 } else {
  # maintain the next two lists in lockstep (!)
  if {[set x [lsearch -integer -sorted [list 21 22 25 53 80 110 115 143 443 465 587 990 993 995 3128 8080] [TCP::local_port]]] >= 0} {
   set ctx(ptcl) [lindex [list "ftp" "ssh" "smtp" "dns" "http" "pop3" "sftp" "imap" "https" "smtps" "smtp" "ftps" "imaps" "pop3s" "http" "http"] $x]
  }
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENT_ACCEPTED TCP from ${srcIP}_${srcPort} to ${dstIP}_${dstPort}${ctx(xpinfo)} L7 guess=$ctx(ptcl)"
 }

 TCP::collect 1 0 ; # dispatch probe
} ; #CLIENT_ACCEPTED


when SERVER_CONNECTED {
 if { not [info exists ctx(csf)] } {
  #initial connection, currently a probe, listen for SSF
  TCP::collect 1
 }

 if {$ctx(log) > 1} {
  set didsnat ""
  set snatIP [IP::local_addr]
  set snatPort [TCP::local_port]
  if {($snatIP ne $srcIP) || ($snatPort ne $srcPort)} {
   # even when we do not deliberately SNAT (e.g., when in split mode)
   # TMOS may give us a fresh client ephemeral port.  Possible reasons
   # include DAG on the exit VLAN and "at the moment, the requested
   # client port belongs to the TCB for an earlier connection now
   # stuck in TCP TIME/WAIT state"
   set didsnat "SNAT ${snatIP}_${snatPort}"
  }
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "SERVER_CONNECTED ${srcIP}_${srcPort} to ${dstIP}_${dstPort} ${didsnat}"
 }
} ; #SERVER_CONNECTED

when SERVER_DATA {
 set len [TCP::payload length]
 if { [info exists ctx(csf)] } {
  #someone beat us to it
  TCP::release
  return
 } elseif {!$len} {
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "SERVER_DATA got empty payload, retrying"
  }
  TCP::collect
  return
 } elseif {[info exists proxyconnect] && ($proxyconnect)} {
  TCP::release
  TCP::collect
  return
 } else {
  set ctx(ssf) true
  set said [TCP::payload]
 }

 set ctx(ptcl) [call /Common/sslo_outbound.app/sslo_outbound-lib::ssf_ptcl $ctx(ptcl) $said]

 call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "SERVER_DATA server spoke first ${len} bytes, L7 guess=$ctx(ptcl)"

 TCP::release
} ; #SERVER_DATA

when HTTP_PROXY_CONNECT  {
 set proxyconnect true
}

when HTTP_PROXY_RESPONSE {
  set proxyconnect false
}

when HTTP_REQUEST {
 if {[HTTP::method] eq "CONNECT"} {
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "HTTP_REQUEST [HTTP::method] [HTTP::uri] $dstIP:$dstPort."
  }
  set connhost "" ; set connport ""
  if {[regexp {^([A-Za-z\d\.-]+):(\d+)} [HTTP::uri] junk connhost connport] ||
      [regexp {^\[([a-fA-F\d:]+)\]:(\d+)} [HTTP::uri] junk connhost connport]} {
   set connhost [string tolower $connhost]
  } else { unset connhost; unset connport }
 } else {
   event HTTP_RESPONSE_RELEASE disable
 }
} ; #HTTP_REQUEST

when HTTP_RESPONSE_RELEASE {
 if { [HTTP::status] == 200 } {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP CONNECT success. Ready for HTTP tunnel."
  set ctx(httpconn) 1
  SSL::disable clientside
  SSL::disable serverside

  if { [info exists ctx(csf)] } {
   unset ctx(csf)
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP-CONNECT $connhost:$connport, L7 guess=$ctx(ptcl)"
  }
  if { [info exists ctx(ssf)] } {
   unset ctx(ssf)
  }

  TCP::collect
  serverside {TCP::collect}
 } else {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP response code [HTTP::status]."
 }
} ; #HTTP_RESPONSE_RELEASE

when CLIENT_DATA {
 set len [TCP::payload length]
 if { [info exists ctx(ssf)] } {
  #someone beat us to it
  TCP::release
  return
 } elseif {!$len} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENT_DATA got empty payload, retrying"
  TCP::collect
  return
 } else {
  set ctx(csf) true
  set said [TCP::payload]
  # release accepted event, if held, to proxy for creating connection to server
  TCP::release 0
 }

 # got at least one octet

 if {($len < 44) &&
     ( ([binary scan $said c type] == 1) &&
       (($type & 0xff) == 22) )} {
  # may be partial TLS Client Hello (unusual)
  # allow up to 7 seconds for the rest to arrive
  # by modifying the connection idle timer. This will be
  # reset after we get the complete hello (or plaintext data)
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENT_DATA Incomplete Client Hello, set idle timeout to 7 sec"
  }
  set ipIdleTmo [IP::idle_timeout]
  IP::idle_timeout 7
 } ; #(partial Client Hello)

 if {[info exists ctx(httpconn)] && ([ACCESS::perflow get perflow.ssl_bypass_set] == 1)} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENT_DATA SSL bypass set inside HTTP CONNECT"
  CONNECTOR::enable
 }

 SSL::enable clientside

 after 0 { TCP::release }
} ; #CLIENT_DATA


when CLIENTSSL_PASSTHROUGH {
 #Reset connection idle timer
 if {[info exists ipIdleTmo]} {
  IP::idle_timeout $ipIdleTmo
 }

 #csf_ptcl needs at least 8 bytes for http traffic to find the
 #http method. SSL ingress processing ensures we have at least
 #9 bytes before it calls CLIENTSSL_PASSTHROUGH. So, we don't
 #need any timers to collect data here, however, add a check
 #in case ssl behavior changes.
 if {($ctx(ptcl) eq "http" || $ctx(ptcl) eq "https") && ${len} < 8} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 1 "CLIENTSSL_PASSTHROUGH http insuffient bytes ${len}"
  reject
  return
 }

 # not TLS
 set ctx(ptcl) [call /Common/sslo_outbound.app/sslo_outbound-lib::csf_ptcl $ctx(ptcl) $said $len]
 call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_PASSTHROUGH client spoke first ${len} bytes, not TLS, L7 guess=$ctx(ptcl)"

 #Explicit proxy connection
 if { $ctx(ptcl) eq "http-connect" } {
  if { [info exists ctx(httpconn)] } {
   call /Common/sslo_outbound.app/sslo_outbound-lib::log 1 "CLIENTSSL_PASSTHROUGH Recursive HTTP CONNECT is not supported. Reject."
   reject
   return
  }
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_PASSTHROUGH Monitoring CONNECT handshake."
  if {[PROFILE::exists http]} {
   HTTP::enable
  }
  return
 }
}

when CLIENTSSL_CLIENTHELLO {
 #Reset connection idle timer
 if {[info exists ipIdleTmo]} {
  IP::idle_timeout $ipIdleTmo
 }

 if {$ctx(log) > 1} {
  if {[SSL::extensions exists -type 0]} {
   binary scan [SSL::extensions -type 0] @9a* SNI
   if {[regexp {(?i)[^a-z0-9.-]} $SNI]} {
    call /Common/sslo_outbound.app/sslo_outbound-lib::log 1 "CLIENTSSL_CLIENTHELLO client offered bogus SNI"
   } else {
    set ctx(SNI) [string tolower $SNI]
   }
  }
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_CLIENTHELLO client spoke [SSL::cipher version] Client Hello ${len} bytes, SNI='$ctx(SNI)', L7 guess=$ctx(ptcl), pre-HS"
 }

 SSL::enable serverside
} ; #CLIENTSSL_CLIENTHELLO


when CLIENTSSL_HANDSHAKE {
 SSL::unclean_shutdown enable

 if {$ctx(log) > 1} {
  set m [expr {($ctx(SNI) eq "") ? "NO_SNI" : $ctx(SNI)}]
  append m "-[SSL::cipher version]-[SSL::cipher name]-[SSL::cipher bits]"
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_HANDSHAKE ${m}"
 }

 set clientssl_handshake 1
 if { [info exists serverssl_data_collected] } {
  peer { SSL::release }
 }

 SSL::collect
} ; #CLIENTSSL_HANDSHAKE


when CLIENTSSL_DATA {
 #Get inner protocol
 set inner_ptcl [call /Common/sslo_outbound.app/sslo_outbound-lib::csf_ptcl $ctx(ptcl) [SSL::payload] [SSL::payload length]]

 #HTTP CONNECT inside SSL?
 if { $inner_ptcl eq "http-connect" } {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 1 "CLIENTSSL_DATA Detected HTTP CONNECT inside TLS. Reject."
  reject
  return
 }

 if { [info exists ctx(httpconn)] } {
  # Not enabling HTTP on CONNECT tunnel data
  HTTP::disable
 }

 if { [info exists ctx(ssf_ssl)] } {
  SSL::release
  return
 } else {
  set ctx(csf_ssl) true
 }

 # If csf_ptcl returns incomplete, then there is insufficient data collected
 # to determine HTTP method (this could be for example due to split HTTP
 # requests to prevent BEAST attack). Set a timer to collect more bytes.
 # If timer expires, then release whatever data we got to process further.
 if { $inner_ptcl eq "incomplete" } {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_DATA ${srcIP}_${srcPort} to ${dstIP}_${dstPort} insufficient decrypted SSL payload, set timer"
  if { ![info exists rccollecttmr] } {
   set rccollecttmr [after 1000 {
    call /Common/sslo_outbound.app/sslo_outbound-lib::log 1 "CLIENTSSL_DATA ${srcIP}_${srcPort} to ${dstIP}_${dstPort} 1234 insufficient decrypted SSL payload, reset L7 ptcl to unknown"
    set ctx(ptcl) "unknown"
    unset rccollecttmr
    event CLIENTSSL_DATA disable ; # prevent more CLIENTSSL_DATA event
    SSL::release
   }]
  }
  return
 }
 if {[info exists rccollecttmr]} {
  after cancel $rccollecttmr
  unset rccollecttmr
 }

 # Update ctx(ptcl) to the inner protocol unless this is http.
 # For http, update to https
 if { $inner_ptcl ne "http" } {
  set ctx(ptcl) $inner_ptcl
 } else {
  set ctx(ptcl) "https"
 }

 event CLIENTSSL_DATA disable ; # prevent more CLIENTSSL_DATA event

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENTSSL_DATA client spoke first within TLS [SSL::payload length] bytes, inner-protocol $inner_ptcl, L7 guess=$ctx(ptcl), post-HS"
 }

 SSL::release
} ; #CLIENTSSL_DATA

when SERVERSSL_HANDSHAKE {
 SSL::unclean_shutdown enable
 SSL::collect
} ; #SERVERSSL_HANDSHAKE

when L7CHECK_CLIENT_DATA {
  L7CHECK::protocol set $ctx(ptcl)
  if { $ctx(ptcl) eq "http" || $ctx(ptcl) eq "https" } {
   catch {
    HTTP::enable
    CONNECTOR::enable
   }
  }
}

when L7CHECK_SERVER_DATA {
  L7CHECK::protocol set $ctx(ptcl)
}

when SERVERSSL_DATA {
 if { [info exists ctx(csf_ssl)] } {
  SSL::release
  return
 } else {
  set ctx(ssf_ssl) true
 }

 set ctx(ptcl) [call /Common/sslo_outbound.app/sslo_outbound-lib::ssf_ptcl $ctx(ptcl) [SSL::payload]]

 if {$ctx(ptcl) eq "imap"} {
  set ctx(ptcl) "imaps"
 } elseif {$ctx(ptcl) eq "smtp"} {
  set ctx(ptcl) "smtps"
 } elseif {$ctx(ptcl) eq "pop3"} {
  set ctx(ptcl) "pop3s"
 } elseif {$ctx(ptcl) eq "ftp"} {
  set ctx(ptcl) "ftps"
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "SERVERSSL_DATA server spoke first within TLS [SSL::payload length] bytes, L7 guess=$ctx(ptcl)"
 }

 if { [info exists clientssl_handshake] } {
  SSL::release
 } else {
  set serverssl_data_collected 1
 }
} ; #SERVERSSL_DATA

when ACCESS_PER_REQUEST_AGENT_EVENT {
    switch [ACCESS::perflow get perflow.irule_agent_id] {
        "sslo_get_category" {
            call /Common/sslo_outbound.app/sslo_outbound-lib::store_host_header $said
        }
        default {
        }
    }
}
}
ltm rule /Common/sslo_outbound.app/sslo_outbound-in_u {
    app-service /Common/sslo_outbound.app/sslo_outbound
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

when CLIENT_ACCEPTED {
 sharedvar ctx

 set ctx(log) 0

 set dstIP [IP::local_addr]
 set dstPort [UDP::local_port]
 set srcIP [IP::client_addr]
 set srcPort [UDP::client_port]

 set ctx(ptcl) "other"
 set ctx(SNI) ""

 #(we could probably detect QUIC flows by matching public-flags,
 #connection-id, and sequence number (advancing from one packet
 #to another) across a series of packets with the same 5-tuple)
 # according to doc of 1.5 sslo iapp, we define QUIC as UDP port 80/443, QQQQ as QUIC connection attempts on any port
 set len [UDP::payload length]
 if {($dstPort == 80) || ($dstPort == 443)} {
  set ctx(ptcl) "quic"
 } elseif { ($len >= 14) &&
      ([binary scan [UDP::payload 14] cwS f cid v] == 3) &&
      (($f & 0xcd) == 0x0d) && ($v == 0x5130 ) &&
      ($len >= (13 + (($f & 0x30) >> 3))) } {
  set ctx(ptcl) "qqqq"
 } elseif {$dstPort == 53} {
  set ctx(ptcl) "dns"
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "CLIENT_ACCEPTED UDP from ${srcIP}_${srcPort} to ${dstIP}_${dstPort} L7 guess=${ctx(ptcl)}"
 }
} ; #CLIENT_ACCEPTED

when SERVER_CONNECTED {
 if {$ctx(log) > 1} {
  set didsnat ""
  set snatIP [IP::local_addr]
  set snatPort [UDP::local_port]
  if {($snatIP ne $srcIP) || ($snatPort ne $srcPort)} {
   # even when we do not deliberately SNAT (e.g., when in split mode)
   # TMOS may give us a fresh client ephemeral port.  Possible reasons
   # include DAG on the exit VLAN and "at the moment, the requested
   # client port belongs to the TCB for an earlier connection now
   # stuck in TCP TIME/WAIT state"
   set didsnat "SNAT ${snatIP}_${snatPort}"
  }
  call /Common/sslo_outbound.app/sslo_outbound-lib::log 2 "SERVER_CONNECTED ${srcIP}_${srcPort} to ${dstIP}_${dstPort} ${didsnat}"
 }
}

when L7CHECK_CLIENT_DATA {
 L7CHECK::protocol set $ctx(ptcl)
}
}
ltm rule /Common/sslo_outbound.app/sslo_outbound-lib {
    app-service /Common/sslo_outbound.app/sslo_outbound
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

# emit a log message
# uses ACCESS::log ssl-orchestrator.[debug|notice|error] $msg to make use of
# the Common Logging Framework
proc log {level msg} {
 if {$msg eq ""} { return }

 if {$level == 0} {
  ACCESS::log ssl-orchestrator.error "[virtual] $msg"
 } elseif {$level == 1} {
  ACCESS::log ssl-orchestrator.notice "[virtual] $msg"
 } elseif {$level == 2} {
  ACCESS::log ssl-orchestrator.debug "[virtual] $msg"
 }
} ; #proc log

# try to ascertain protocol from first few bytes that server
# sent. If unrecognized, return value of argument ptcl, else
# suitable protocol string
proc ssf_ptcl {ptcl taste} {
 if {[regexp {^(220 .+ (ESMTP|\*) (OK|NO|BAD) ).*\r\n$} $taste]} {
  # looks like SMTP (not a complete test)
  return "smtp"
 }
 if {[string first "SSH-2.0-" $taste] == 0} {
  #looks like SSH
  return "ssh"
 }
 return $ptcl
} ; #proc ssf_ptcl


# try to ascertain protocol from first few bytes that client
# sent. If unrecognized, return value of argument ptcl, else
# suitable protocol string.
#
# For test against expected http methods, make sure we have enough
# data "mincollectlen" bytes for comparison to be valid. If not, set
# ptcl so caller can collect more data. Note that "mincollectlen"
# is set to 8 which is the longest http method aka "PROPFIND". If we
# update the expected set of http methods, we need to make sure
# that "mincollectlen" is updated, as needed.
proc csf_ptcl {ptcl taste len} {
 if {[regexp {^([A-Z]+) (?:/|https?://|[A-Za-z\d-]{1,63}[.]|\[[a-fA-F\d:]+\]|(?:[*]\x20))} $taste junk method]} {
  # looks like HTTP (not a complete test because we are disinclined
  # to accumulate client data looking for full HTTP request)
  if { $method eq "CONNECT" } {
   return "http-connect"
  }
  if {([lsearch -exact -sorted {DELETE GET HEAD LOCK
   OPTIONS PATCH POST PROPFIND PUT TRACE UNLOCK} $method] >= 0)} {
   return "http"
  }
 }
 if {$ptcl eq "http" || $ptcl eq "https" || $ptcl eq "http-connect"} {
  if { $len < 8 } {
   set ptcl "incomplete"
  } else {
   set ptcl "unknown"
  }
  return $ptcl
 }
 if {[string first "SSH-2.0-" $taste] == 0} {
  #looks like SSH, which is ssf (chuckle) so we shouldn't be here,
  #but in future after we hear from server we may check on what
  #client says to better discriminate application protocol (like
  #if server says SSH-2.0 and client says SSH-1.99 we suspect older
  #client, maybe vulnerable to protocol downgrade attack)
  return "ssh"
 }
 return $ptcl
} ; #proc csf_ptcl

proc store_host_header said {
 if {[regexp {^([A-Z]+) (?:/|https?://|[A-Za-z\d-]{1,63}[.]|\[[a-fA-F\d:]+\]|(?:[*]\x20))} $said junk method] &&
     ([lsearch -exact -sorted {CONNECT DELETE GET HEAD LOCK OPTIONS PATCH POST PROPFIND PUT TRACE UNLOCK} $method] >= 0)} {
  set host_hdr [findstr ${said} "Host: " 6 "\r\n"]
  if { [SSL::mode] == 0 } {
   set scheme "http://"
  } else {
   set scheme "https://"
  }
  if { ${host_hdr} ne "" } {
   set cat_result [CATEGORY::lookup "${scheme}${host_hdr}/" -id custom]
   set custom "| [join ${cat_result} { | }] |"
   set scratchpad [lindex ${cat_result} 0]
   if { ${custom} eq "|  |" } {
    set custom "| 153 |"
    set scratchpad "153"
   }
   ACCESS::perflow set perflow.custom ${custom}
   ACCESS::perflow set perflow.scratchpad ${scratchpad}
 } else {
   # Empty host header found"
  }
 } else {
  # Not HTTP or HTTPS, or unable to parse header."
 }
} ; #proc store_host_header
}
ltm rule /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-in_t {
    app-service /Common/sslo_outbound_bypass.app/sslo_outbound_bypass
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

when CLIENT_ACCEPTED {
 SSL::disable clientside
 SSL::disable serverside
 HTTP::disable

 sharedvar ctx

 set ctx(log) 0
 set srcIP [IP::client_addr]
 set dstIP [IP::local_addr]
 set srcPort [TCP::client_port]
 set dstPort [TCP::local_port]
 set ctx(SNI) ""
 set ctx(ptcl) "unknown"
 set ctx(xpinfo) ""

 sharedvar XPHOST
 if { [info exists XPHOST] } {
  if { $XPHOST eq "" } {
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 0 "CLIENT_ACCEPTED invalid host (${XPHOST}) for explicit-proxy client ${srcIP}_${srcPort}"
   TCP::respond "HTTP/1.1 500 Server Error\r\nConnection: close\r\n\r\n"
   TCP::close
   return
  }

  if {$ctx(log)} {
   set ctx(xpinfo) "\x20explicit-proxy request ${XPHOST}"
  }

  set ctx(ptcl) "http"
 } else {
  # maintain the next two lists in lockstep (!)
  if {[set x [lsearch -integer -sorted [list 21 22 25 53 80 110 115 143 443 465 587 990 993 995 3128 8080] [TCP::local_port]]] >= 0} {
   set ctx(ptcl) [lindex [list "ftp" "ssh" "smtp" "dns" "http" "pop3" "sftp" "imap" "https" "smtps" "smtp" "ftps" "imaps" "pop3s" "http" "http"] $x]
  }
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENT_ACCEPTED TCP from ${srcIP}_${srcPort} to ${dstIP}_${dstPort}${ctx(xpinfo)} L7 guess=$ctx(ptcl)"
 }

 TCP::collect 1 0 ; # dispatch probe
} ; #CLIENT_ACCEPTED


when SERVER_CONNECTED {
 if { not [info exists ctx(csf)] } {
  #initial connection, currently a probe, listen for SSF
  TCP::collect 1
 }

 if {$ctx(log) > 1} {
  set didsnat ""
  set snatIP [IP::local_addr]
  set snatPort [TCP::local_port]
  if {($snatIP ne $srcIP) || ($snatPort ne $srcPort)} {
   # even when we do not deliberately SNAT (e.g., when in split mode)
   # TMOS may give us a fresh client ephemeral port.  Possible reasons
   # include DAG on the exit VLAN and "at the moment, the requested
   # client port belongs to the TCB for an earlier connection now
   # stuck in TCP TIME/WAIT state"
   set didsnat "SNAT ${snatIP}_${snatPort}"
  }
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "SERVER_CONNECTED ${srcIP}_${srcPort} to ${dstIP}_${dstPort} ${didsnat}"
 }
} ; #SERVER_CONNECTED

when SERVER_DATA {
 set len [TCP::payload length]
 if { [info exists ctx(csf)] } {
  #someone beat us to it
  TCP::release
  return
 } elseif {!$len} {
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "SERVER_DATA got empty payload, retrying"
  }
  TCP::collect
  return
 } elseif {[info exists proxyconnect] && ($proxyconnect)} {
  TCP::release
  TCP::collect
  return
 } else {
  set ctx(ssf) true
  set said [TCP::payload]
 }

 set ctx(ptcl) [call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::ssf_ptcl $ctx(ptcl) $said]

 call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "SERVER_DATA server spoke first ${len} bytes, L7 guess=$ctx(ptcl)"

 TCP::release
} ; #SERVER_DATA

when HTTP_PROXY_CONNECT  {
 set proxyconnect true
}

when HTTP_PROXY_RESPONSE {
  set proxyconnect false
}

when HTTP_REQUEST {
 if {[HTTP::method] eq "CONNECT"} {
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "HTTP_REQUEST [HTTP::method] [HTTP::uri] $dstIP:$dstPort."
  }
  set connhost "" ; set connport ""
  if {[regexp {^([A-Za-z\d\.-]+):(\d+)} [HTTP::uri] junk connhost connport] ||
      [regexp {^\[([a-fA-F\d:]+)\]:(\d+)} [HTTP::uri] junk connhost connport]} {
   set connhost [string tolower $connhost]
  } else { unset connhost; unset connport }
 } else {
   event HTTP_RESPONSE_RELEASE disable
 }
} ; #HTTP_REQUEST

when HTTP_RESPONSE_RELEASE {
 if { [HTTP::status] == 200 } {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP CONNECT success. Ready for HTTP tunnel."
  set ctx(httpconn) 1
  SSL::disable clientside
  SSL::disable serverside

  if { [info exists ctx(csf)] } {
   unset ctx(csf)
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP-CONNECT $connhost:$connport, L7 guess=$ctx(ptcl)"
  }
  if { [info exists ctx(ssf)] } {
   unset ctx(ssf)
  }

  TCP::collect
  serverside {TCP::collect}
 } else {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "HTTP_RESPONSE_RELEASE HTTP response code [HTTP::status]."
 }
} ; #HTTP_RESPONSE_RELEASE

when CLIENT_DATA {
 set len [TCP::payload length]
 if { [info exists ctx(ssf)] } {
  #someone beat us to it
  TCP::release
  return
 } elseif {!$len} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENT_DATA got empty payload, retrying"
  TCP::collect
  return
 } else {
  set ctx(csf) true
  set said [TCP::payload]
  # release accepted event, if held, to proxy for creating connection to server
  TCP::release 0
 }

 # got at least one octet

 if {($len < 44) &&
     ( ([binary scan $said c type] == 1) &&
       (($type & 0xff) == 22) )} {
  # may be partial TLS Client Hello (unusual)
  # allow up to 7 seconds for the rest to arrive
  # by modifying the connection idle timer. This will be
  # reset after we get the complete hello (or plaintext data)
  if {$ctx(log) > 1} {
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENT_DATA Incomplete Client Hello, set idle timeout to 7 sec"
  }
  set ipIdleTmo [IP::idle_timeout]
  IP::idle_timeout 7
 } ; #(partial Client Hello)

 if {[info exists ctx(httpconn)] && ([ACCESS::perflow get perflow.ssl_bypass_set] == 1)} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENT_DATA SSL bypass set inside HTTP CONNECT"
  CONNECTOR::enable
 }

 SSL::enable clientside

 after 0 { TCP::release }
} ; #CLIENT_DATA


when CLIENTSSL_PASSTHROUGH {
 #Reset connection idle timer
 if {[info exists ipIdleTmo]} {
  IP::idle_timeout $ipIdleTmo
 }

 #csf_ptcl needs at least 8 bytes for http traffic to find the
 #http method. SSL ingress processing ensures we have at least
 #9 bytes before it calls CLIENTSSL_PASSTHROUGH. So, we don't
 #need any timers to collect data here, however, add a check
 #in case ssl behavior changes.
 if {($ctx(ptcl) eq "http" || $ctx(ptcl) eq "https") && ${len} < 8} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 1 "CLIENTSSL_PASSTHROUGH http insuffient bytes ${len}"
  reject
  return
 }

 # not TLS
 set ctx(ptcl) [call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::csf_ptcl $ctx(ptcl) $said $len]
 call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_PASSTHROUGH client spoke first ${len} bytes, not TLS, L7 guess=$ctx(ptcl)"

 #Explicit proxy connection
 if { $ctx(ptcl) eq "http-connect" } {
  if { [info exists ctx(httpconn)] } {
   call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 1 "CLIENTSSL_PASSTHROUGH Recursive HTTP CONNECT is not supported. Reject."
   reject
   return
  }
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_PASSTHROUGH Monitoring CONNECT handshake."
  if {[PROFILE::exists http]} {
   HTTP::enable
  }
  return
 }
}

when CLIENTSSL_CLIENTHELLO {
 #Reset connection idle timer
 if {[info exists ipIdleTmo]} {
  IP::idle_timeout $ipIdleTmo
 }

 if {$ctx(log) > 1} {
  if {[SSL::extensions exists -type 0]} {
   binary scan [SSL::extensions -type 0] @9a* SNI
   if {[regexp {(?i)[^a-z0-9.-]} $SNI]} {
    call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 1 "CLIENTSSL_CLIENTHELLO client offered bogus SNI"
   } else {
    set ctx(SNI) [string tolower $SNI]
   }
  }
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_CLIENTHELLO client spoke [SSL::cipher version] Client Hello ${len} bytes, SNI='$ctx(SNI)', L7 guess=$ctx(ptcl), pre-HS"
 }

 SSL::enable serverside
} ; #CLIENTSSL_CLIENTHELLO


when CLIENTSSL_HANDSHAKE {
 SSL::unclean_shutdown enable

 if {$ctx(log) > 1} {
  set m [expr {($ctx(SNI) eq "") ? "NO_SNI" : $ctx(SNI)}]
  append m "-[SSL::cipher version]-[SSL::cipher name]-[SSL::cipher bits]"
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_HANDSHAKE ${m}"
 }

 set clientssl_handshake 1
 if { [info exists serverssl_data_collected] } {
  peer { SSL::release }
 }

 SSL::collect
} ; #CLIENTSSL_HANDSHAKE


when CLIENTSSL_DATA {
 #Get inner protocol
 set inner_ptcl [call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::csf_ptcl $ctx(ptcl) [SSL::payload] [SSL::payload length]]

 #HTTP CONNECT inside SSL?
 if { $inner_ptcl eq "http-connect" } {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 1 "CLIENTSSL_DATA Detected HTTP CONNECT inside TLS. Reject."
  reject
  return
 }

 if { [info exists ctx(httpconn)] } {
  # Not enabling HTTP on CONNECT tunnel data
  HTTP::disable
 }

 if { [info exists ctx(ssf_ssl)] } {
  SSL::release
  return
 } else {
  set ctx(csf_ssl) true
 }

 # If csf_ptcl returns incomplete, then there is insufficient data collected
 # to determine HTTP method (this could be for example due to split HTTP
 # requests to prevent BEAST attack). Set a timer to collect more bytes.
 # If timer expires, then release whatever data we got to process further.
 if { $inner_ptcl eq "incomplete" } {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_DATA ${srcIP}_${srcPort} to ${dstIP}_${dstPort} insufficient decrypted SSL payload, set timer"
  if { ![info exists rccollecttmr] } {
   set rccollecttmr [after 1000 {
    call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 1 "CLIENTSSL_DATA ${srcIP}_${srcPort} to ${dstIP}_${dstPort} 1234 insufficient decrypted SSL payload, reset L7 ptcl to unknown"
    set ctx(ptcl) "unknown"
    unset rccollecttmr
    event CLIENTSSL_DATA disable ; # prevent more CLIENTSSL_DATA event
    SSL::release
   }]
  }
  return
 }
 if {[info exists rccollecttmr]} {
  after cancel $rccollecttmr
  unset rccollecttmr
 }

 # Update ctx(ptcl) to the inner protocol unless this is http.
 # For http, update to https
 if { $inner_ptcl ne "http" } {
  set ctx(ptcl) $inner_ptcl
 } else {
  set ctx(ptcl) "https"
 }

 event CLIENTSSL_DATA disable ; # prevent more CLIENTSSL_DATA event

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENTSSL_DATA client spoke first within TLS [SSL::payload length] bytes, inner-protocol $inner_ptcl, L7 guess=$ctx(ptcl), post-HS"
 }

 SSL::release
} ; #CLIENTSSL_DATA

when SERVERSSL_HANDSHAKE {
 SSL::unclean_shutdown enable
 SSL::collect
} ; #SERVERSSL_HANDSHAKE

when L7CHECK_CLIENT_DATA {
  L7CHECK::protocol set $ctx(ptcl)
  if { $ctx(ptcl) eq "http" || $ctx(ptcl) eq "https" } {
   catch {
    HTTP::enable
    CONNECTOR::enable
   }
  }
}

when L7CHECK_SERVER_DATA {
  L7CHECK::protocol set $ctx(ptcl)
}

when SERVERSSL_DATA {
 if { [info exists ctx(csf_ssl)] } {
  SSL::release
  return
 } else {
  set ctx(ssf_ssl) true
 }

 set ctx(ptcl) [call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::ssf_ptcl $ctx(ptcl) [SSL::payload]]

 if {$ctx(ptcl) eq "imap"} {
  set ctx(ptcl) "imaps"
 } elseif {$ctx(ptcl) eq "smtp"} {
  set ctx(ptcl) "smtps"
 } elseif {$ctx(ptcl) eq "pop3"} {
  set ctx(ptcl) "pop3s"
 } elseif {$ctx(ptcl) eq "ftp"} {
  set ctx(ptcl) "ftps"
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "SERVERSSL_DATA server spoke first within TLS [SSL::payload length] bytes, L7 guess=$ctx(ptcl)"
 }

 if { [info exists clientssl_handshake] } {
  SSL::release
 } else {
  set serverssl_data_collected 1
 }
} ; #SERVERSSL_DATA

when ACCESS_PER_REQUEST_AGENT_EVENT {
    switch [ACCESS::perflow get perflow.irule_agent_id] {
        "sslo_get_category" {
            call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::store_host_header $said
        }
        default {
        }
    }
}
}
ltm rule /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-in_u {
    app-service /Common/sslo_outbound_bypass.app/sslo_outbound_bypass
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

when CLIENT_ACCEPTED {
 sharedvar ctx

 set ctx(log) 0

 set dstIP [IP::local_addr]
 set dstPort [UDP::local_port]
 set srcIP [IP::client_addr]
 set srcPort [UDP::client_port]

 set ctx(ptcl) "other"
 set ctx(SNI) ""

 #(we could probably detect QUIC flows by matching public-flags,
 #connection-id, and sequence number (advancing from one packet
 #to another) across a series of packets with the same 5-tuple)
 # according to doc of 1.5 sslo iapp, we define QUIC as UDP port 80/443, QQQQ as QUIC connection attempts on any port
 set len [UDP::payload length]
 if {($dstPort == 80) || ($dstPort == 443)} {
  set ctx(ptcl) "quic"
 } elseif { ($len >= 14) &&
      ([binary scan [UDP::payload 14] cwS f cid v] == 3) &&
      (($f & 0xcd) == 0x0d) && ($v == 0x5130 ) &&
      ($len >= (13 + (($f & 0x30) >> 3))) } {
  set ctx(ptcl) "qqqq"
 } elseif {$dstPort == 53} {
  set ctx(ptcl) "dns"
 }

 if {$ctx(log) > 1} {
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "CLIENT_ACCEPTED UDP from ${srcIP}_${srcPort} to ${dstIP}_${dstPort} L7 guess=${ctx(ptcl)}"
 }
} ; #CLIENT_ACCEPTED

when SERVER_CONNECTED {
 if {$ctx(log) > 1} {
  set didsnat ""
  set snatIP [IP::local_addr]
  set snatPort [UDP::local_port]
  if {($snatIP ne $srcIP) || ($snatPort ne $srcPort)} {
   # even when we do not deliberately SNAT (e.g., when in split mode)
   # TMOS may give us a fresh client ephemeral port.  Possible reasons
   # include DAG on the exit VLAN and "at the moment, the requested
   # client port belongs to the TCB for an earlier connection now
   # stuck in TCP TIME/WAIT state"
   set didsnat "SNAT ${snatIP}_${snatPort}"
  }
  call /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib::log 2 "SERVER_CONNECTED ${srcIP}_${srcPort} to ${dstIP}_${dstPort} ${didsnat}"
 }
}

when L7CHECK_CLIENT_DATA {
 L7CHECK::protocol set $ctx(ptcl)
}
}
ltm rule /Common/sslo_outbound_bypass.app/sslo_outbound_bypass-lib {
    app-service /Common/sslo_outbound_bypass.app/sslo_outbound_bypass
# Copyright (c) 2018.  F5 Networks, Inc.  See End User License Agreement (EULA) for license terms.
# Notwithstanding anything to the contrary in the EULA, Licensee may copy and modify
# this software product for its internal business purposes. Further, Licensee may upload,
# publish and distribute the modified version of the software product on devcentral.f5.com.

# emit a log message
# uses ACCESS::log ssl-orchestrator.[debug|notice|error] $msg to make use of
# the Common Logging Framework
proc log {level msg} {
 if {$msg eq ""} { return }

 if {$level == 0} {
  ACCESS::log ssl-orchestrator.error "[virtual] $msg"
 } elseif {$level == 1} {
  ACCESS::log ssl-orchestrator.notice "[virtual] $msg"
 } elseif {$level == 2} {
  ACCESS::log ssl-orchestrator.debug "[virtual] $msg"
 }
} ; #proc log

# try to ascertain protocol from first few bytes that server
# sent. If unrecognized, return value of argument ptcl, else
# suitable protocol string
proc ssf_ptcl {ptcl taste} {
 if {[regexp {^(220 .+ (ESMTP|\*) (OK|NO|BAD) ).*\r\n$} $taste]} {
  # looks like SMTP (not a complete test)
  return "smtp"
 }
 if {[string first "SSH-2.0-" $taste] == 0} {
  #looks like SSH
  return "ssh"
 }
 return $ptcl
} ; #proc ssf_ptcl


# try to ascertain protocol from first few bytes that client
# sent. If unrecognized, return value of argument ptcl, else
# suitable protocol string.
#
# For test against expected http methods, make sure we have enough
# data "mincollectlen" bytes for comparison to be valid. If not, set
# ptcl so caller can collect more data. Note that "mincollectlen"
# is set to 8 which is the longest http method aka "PROPFIND". If we
# update the expected set of http methods, we need to make sure
# that "mincollectlen" is updated, as needed.
proc csf_ptcl {ptcl taste len} {
 if {[regexp {^([A-Z]+) (?:/|https?://|[A-Za-z\d-]{1,63}[.]|\[[a-fA-F\d:]+\]|(?:[*]\x20))} $taste junk method]} {
  # looks like HTTP (not a complete test because we are disinclined
  # to accumulate client data looking for full HTTP request)
  if { $method eq "CONNECT" } {
   return "http-connect"
  }
  if {([lsearch -exact -sorted {DELETE GET HEAD LOCK
   OPTIONS PATCH POST PROPFIND PUT TRACE UNLOCK} $method] >= 0)} {
   return "http"
  }
 }
 if {$ptcl eq "http" || $ptcl eq "https" || $ptcl eq "http-connect"} {
  if { $len < 8 } {
   set ptcl "incomplete"
  } else {
   set ptcl "unknown"
  }
  return $ptcl
 }
 if {[string first "SSH-2.0-" $taste] == 0} {
  #looks like SSH, which is ssf (chuckle) so we shouldn't be here,
  #but in future after we hear from server we may check on what
  #client says to better discriminate application protocol (like
  #if server says SSH-2.0 and client says SSH-1.99 we suspect older
  #client, maybe vulnerable to protocol downgrade attack)
  return "ssh"
 }
 return $ptcl
} ; #proc csf_ptcl

proc store_host_header said {
 if {[regexp {^([A-Z]+) (?:/|https?://|[A-Za-z\d-]{1,63}[.]|\[[a-fA-F\d:]+\]|(?:[*]\x20))} $said junk method] &&
     ([lsearch -exact -sorted {CONNECT DELETE GET HEAD LOCK OPTIONS PATCH POST PROPFIND PUT TRACE UNLOCK} $method] >= 0)} {
  set host_hdr [findstr ${said} "Host: " 6 "\r\n"]
  if { [SSL::mode] == 0 } {
   set scheme "http://"
  } else {
   set scheme "https://"
  }
  if { ${host_hdr} ne "" } {
   set cat_result [CATEGORY::lookup "${scheme}${host_hdr}/" -id custom]
   set custom "| [join ${cat_result} { | }] |"
   set scratchpad [lindex ${cat_result} 0]
   if { ${custom} eq "|  |" } {
    set custom "| 153 |"
    set scratchpad "153"
   }
   ACCESS::perflow set perflow.custom ${custom}
   ACCESS::perflow set perflow.scratchpad ${scratchpad}
 } else {
   # Empty host header found"
  }
 } else {
  # Not HTTP or HTTPS, or unable to parse header."
 }
} ; #proc store_host_header
}
